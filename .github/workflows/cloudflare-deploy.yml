name: Cloudflare Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend-hono/**"
      - "frontend/**"
      - ".github/workflows/cloudflare-deploy.yml"

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install backend-hono deps
        run: pnpm install --frozen-lockfile
        working-directory: backend-hono

      - name: Check backend-hono
        run: pnpm check
        working-directory: backend-hono

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Check frontend
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build
        working-directory: frontend

  deploy-backend:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: preflight
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install backend-hono deps
        run: pnpm install --frozen-lockfile
        working-directory: backend-hono

      - name: Validate backend deploy secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          set -euo pipefail
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_D1_DATABASE_ID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is required"
              exit 1
            fi
          done

      - name: Inject D1 Database ID
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          set -euo pipefail
          # WHY: 不依赖仓库中的占位值，确保 CI 总是使用当前环境注入的 D1 数据库 ID。
          sed -i -E "s|^database_id = \".*\"$|database_id = \"${CLOUDFLARE_D1_DATABASE_ID}\"|" backend-hono/wrangler.toml

      - name: Deploy backend-hono worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # WHY: 这里直接调用仓库里已安装的 wrangler，避免 wrangler-action 再封装一层 pnpm
          # 导致工作目录/错误输出不透明，从而出现仅看到 “pnpm exit code 1” 的排障困难问题。
          pnpm exec wrangler deploy
        working-directory: backend-hono

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Validate frontend deploy config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT_NAME VITE_API_BASE_URL; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is required"
              exit 1
            fi
          done

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: pnpm build
        working-directory: frontend

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
