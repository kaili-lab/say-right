name = "say-right-hono"
main = "src/index.ts"
compatibility_date = "2026-03-05"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "say-right"
# 本地开发可直接使用；CI/生产会在 GitHub Actions 中替换为真实 D1 Database ID。
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "drizzle"

[vars]
APP_CORS_ALLOW_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"
