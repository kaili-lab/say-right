<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Say Right - 方案C Warm Orange · 卡片组 V3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f6;
      --surface: #fffffe;
      --primary: #f97316;
      --primary-hover: #ea580c;
      --primary-soft: #fff7ed;
      --primary-soft-hover: #ffedd5;
      --accent: #92400e;
      --text: #292524;
      --muted: #78716c;
      --line: #e7e5e4;
      --card-radius: 16px;
      --btn-radius: 12px;
      --badge-radius: 8px;
      --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 4px 12px rgba(0, 0, 0, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scrollbar-gutter: stable; }

    body {
      font-family: 'Inter', -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .topnav { position: sticky; top: 0; z-index: 50; background: rgba(250, 249, 246, 0.82); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
    .topnav-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: var(--accent); }
    .brand-icon { width: 32px; height: 32px; border-radius: 10px; background: var(--primary); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 800; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab { text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500; padding: 8px 14px; border-radius: var(--btn-radius); transition: all 0.15s ease-out; }
    .nav-tab:hover { background: var(--primary-soft); color: var(--primary); }
    .nav-tab.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
    .avatar-menu { position: relative; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #fff1e0; color: var(--accent); display: grid; place-items: center; font-size: 12px; font-weight: 700; border: 0; cursor: pointer; }
    .avatar:focus-visible { outline: 2px solid #fdba74; outline-offset: 2px; }
    .avatar-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      min-width: 188px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      padding: 6px;
      display: none;
      z-index: 70;
    }
    .avatar-dropdown.show { display: block; }
    .avatar-menu-item {
      width: 100%;
      border: 0;
      background: transparent;
      border-radius: 8px;
      text-align: left;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }
    .avatar-menu-item:hover { background: var(--primary-soft); }
    .avatar-menu-item.danger { color: #b91c1c; }
    .avatar-menu-item.danger:hover { background: #fee2e2; }

    .main { max-width: 1100px; margin: 0 auto; padding: 24px 24px 100px; }
    .header-row { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .title { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .desc { font-size: 14px; color: var(--muted); }

    .view-control { display: flex; gap: 8px; align-items: center; }
    .state-switch { display: inline-flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fff; }
    .state-switch a { text-decoration: none; font-size: 12px; color: var(--muted); padding: 6px 10px; transition: all 0.15s ease-out; }
    .state-switch a.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }

    .btn { display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: var(--btn-radius); font-family: inherit; font-size: 14px; font-weight: 600; padding: 10px 16px; min-height: 44px; cursor: pointer; transition: all 0.15s ease-out; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-ghost { background: var(--primary-soft); color: var(--primary); }
    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .btn:disabled { cursor: not-allowed; opacity: 0.55; }

    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 16px; }
    .card { background: var(--surface); border-radius: var(--card-radius); padding: 20px; border: 1px solid #f5f0ea; box-shadow: var(--shadow-card); min-width: 0; }

    .deck-list-card h2, .detail-card h2 { font-size: 18px; margin-bottom: 12px; }

    .deck-list { display: grid; gap: 10px; max-height: min(66vh, 560px); overflow-y: auto; padding-right: 2px; }
    .deck-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.15s ease-out, background 0.15s ease-out;
    }
    .deck-item.active { border-color: #fdcda8; background: #fffaf4; }
    .deck-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .deck-name { font-size: 14px; font-weight: 700; }
    .deck-due { font-size: 18px; font-weight: 800; color: var(--primary); }

    .deck-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--badge-radius); }
    .badge-new { background: #dbeafe; color: #1d4ed8; }
    .badge-learning { background: #fee2e2; color: #b91c1c; }
    .badge-review { background: #dcfce7; color: #15803d; }
    .deck-flags { display: flex; gap: 6px; flex-wrap: wrap; }
    .flag { font-size: 11px; color: var(--muted); padding: 2px 7px; border-radius: 999px; background: #f5f5f4; }

    .detail-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .detail-name { font-size: 20px; font-weight: 800; color: var(--accent); }
    .detail-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .rule-note {
      font-size: 12px;
      color: var(--muted);
      background: #fff9f2;
      border: 1px solid #f5e4cf;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .table-wrap { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #fff9f2; }
    th, td { text-align: left; font-size: 13px; padding: 10px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .card-en { font-weight: 600; }
    .row-actions { display: flex; gap: 6px; }
    .mini-btn { border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--muted); font-size: 12px; padding: 4px 8px; cursor: pointer; transition: all 0.15s ease-out; min-height: 44px; min-width: 44px; }
    .mini-btn:hover { border-color: #fdcda8; color: var(--primary); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(41, 37, 36, 0.35);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 80;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(500px, 100%);
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      border: 1px solid #f5f0ea;
      overflow: hidden;
    }
    .modal-head { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--accent); }
    .modal-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .modal-close { border: 0; background: transparent; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; width: 44px; height: 44px; display: grid; place-items: center; }
    .modal-body { padding: 12px 16px; max-height: min(56vh, 360px); overflow-y: auto; }
    .modal-foot { border-top: 1px solid var(--line); padding: 12px 16px; display: flex; justify-content: flex-end; gap: 8px; }

    .form-row { display: grid; gap: 6px; margin-bottom: 10px; }
    .form-row:last-child { margin-bottom: 0; }
    .form-label { font-size: 13px; color: var(--muted); font-weight: 600; }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }
    .form-textarea { min-height: 88px; resize: vertical; line-height: 1.5; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }

    .empty-card { background: var(--surface); border: 1px dashed #f1dfcc; border-radius: var(--card-radius); padding: 36px 24px; text-align: center; }
    .empty-card h2 { font-size: 24px; color: var(--accent); margin-bottom: 8px; }
    .empty-card p { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
    .empty-actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

    .bottom-nav { display: none; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .deck-list { max-height: 320px; }
    }

    @media (max-width: 767px) {
      .topnav .nav-tabs, .topnav .avatar { display: none; }
      .main { padding: 16px 16px 96px; }
      .header-row { flex-direction: column; }
      .view-control { width: 100%; justify-content: stretch; }
      .state-switch { width: 100%; }
      .state-switch a { flex: 1; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 44px; padding: 0 10px; }
      .detail-head { flex-direction: column; }
      .table-wrap { overflow-x: auto; }
      .row-actions { display: grid; grid-template-columns: repeat(3, minmax(44px, 1fr)); gap: 6px; }

      .bottom-nav {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(250, 249, 246, 0.92);
        backdrop-filter: blur(12px);
        border-top: 1px solid var(--line);
        padding: 6px 8px calc(env(safe-area-inset-bottom, 8px) + 6px);
        z-index: 50;
      }
      .bottom-nav a {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        text-decoration: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        padding: 6px 4px;
        border-radius: 10px;
      }
      .bottom-nav a.active { color: var(--primary); font-weight: 600; }
      .bottom-nav svg { width: 22px; height: 22px; stroke-width: 1.8; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-inner">
      <div class="brand"><div class="brand-icon">SR</div><span>Say Right</span></div>
      <div class="nav-tabs">
        <a href="v3-c-warm-orange-home.html" class="nav-tab">首页</a>
        <a href="v3-c-warm-orange-record.html" class="nav-tab">记录</a>
        <a href="v3-c-warm-orange-review.html" class="nav-tab">复习</a>
        <a href="#" class="nav-tab active">卡片组</a>
      </div>
      <div class="avatar-menu">
        <button class="avatar" id="avatarBtn" type="button" aria-haspopup="menu" aria-expanded="false">K</button>
        <div class="avatar-dropdown" id="avatarDropdown" role="menu" aria-labelledby="avatarBtn">
          <button class="avatar-menu-item" id="accountInfoBtn" type="button" role="menuitem">账号信息（即将上线）</button>
          <button class="avatar-menu-item danger" id="logoutBtn" type="button" role="menuitem">退出登录</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="header-row">
      <div>
        <h1 class="title">卡片组管理</h1>
        <p class="desc">查看所有 Deck，按组维护卡片，支持移动、编辑、删除。</p>
      </div>
      <div class="view-control">
        <div class="state-switch">
          <a id="normalLink" href="v3-c-warm-orange-decks.html">正常态</a>
          <a id="emptyLink" href="v3-c-warm-orange-decks.html?state=empty">空状态</a>
        </div>
        <button class="btn btn-primary" id="createDeckBtn">+ 创建卡片组</button>
      </div>
    </div>

    <div class="grid" id="mainGrid">
      <section class="card deck-list-card" id="deckListCard">
        <h2>所有卡片组</h2>
        <div class="deck-list" id="deckList"></div>
      </section>

      <section class="card detail-card" id="detailCard">
        <div class="detail-head">
          <div>
            <div class="detail-name" id="detailName"></div>
            <div class="detail-sub" id="detailSub"></div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-ghost" id="moveAllBtn">移动本组全部卡片</button>
            <button class="btn btn-danger" id="deleteDeckBtn">删除卡片组</button>
          </div>
        </div>

        <div class="rule-note" id="ruleNote"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>中文</th>
                <th>英文</th>
                <th>下次复习</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="cardRows"></tbody>
          </table>
        </div>
      </section>
    </div>

    <section class="empty-card" id="emptyCard" style="display:none;">
      <h2>默认组（0 张）</h2>
      <p>当前还没有任何卡片。你可以先创建分组，或先去记录页生成第一张卡片。</p>
      <div class="empty-actions">
        <button class="btn btn-primary" id="createDeckEmptyBtn">创建卡片组</button>
        <button class="btn btn-ghost" onclick="location.href='v3-c-warm-orange-record.html'">去记录新内容</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="deckModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="deckModalTitle">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="deckModalTitle"></div>
          <div class="modal-sub" id="deckModalSub"></div>
        </div>
        <button class="modal-close" id="closeModalBtn" aria-label="关闭">×</button>
      </div>
      <div class="modal-body" id="deckModalBody"></div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="cancelModalBtn">取消</button>
        <button class="btn btn-primary" id="confirmModalBtn">确认</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="v3-c-warm-orange-home.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      首页
    </a>
    <a href="v3-c-warm-orange-record.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      记录
    </a>
    <a href="v3-c-warm-orange-review.html">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 00-.491 6.347A48.62 48.62 0 0112 20.904a48.62 48.62 0 018.232-4.41 60.46 60.46 0 00-.491-6.347m-15.482 0a50.636 50.636 0 00-2.658-.813A59.906 59.906 0 0112 3.493a59.903 59.903 0 0110.399 5.84c-.896.248-1.783.520-2.658.814m-15.482 0A50.717 50.717 0 0112 13.489a50.702 50.702 0 017.74-3.342"/></svg>
      复习
    </a>
    <a href="#" class="active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
      卡片组
    </a>
  </nav>

  <script>
    const params = new URLSearchParams(window.location.search);
    const isEmptyState = params.get('state') === 'empty';

    document.getElementById('normalLink').classList.toggle('active', !isEmptyState);
    document.getElementById('emptyLink').classList.toggle('active', isEmptyState);

    const decks = [
      { id: 'default', name: '默认组', isDefault: true },
      { id: 'daily', name: '日常口语', isDefault: false },
      { id: 'work', name: '工作沟通', isDefault: false },
      { id: 'meeting', name: '英文会议', isDefault: false }
    ];

    const cardsByDeck = {
      default: [
        { id: 'card_1', zh: '这个我再想想。', en: 'Let me think about this.', dueAt: '明天 08:00', status: 'learning', isDue: true }
      ],
      daily: [
        { id: 'card_2', zh: '你今天有空吗？', en: 'Are you free today?', dueAt: '今天 21:30', status: 'new', isDue: true },
        { id: 'card_3', zh: '我晚点给你回复。', en: 'I will get back to you later.', dueAt: '明天 09:00', status: 'learning', isDue: false },
        { id: 'card_4', zh: '我们先吃饭再讨论。', en: 'Let us have dinner first and discuss later.', dueAt: '明天 20:00', status: 'review', isDue: false }
      ],
      work: [
        { id: 'card_5', zh: '我们先对齐下目标。', en: 'Let us align on the goals first.', dueAt: '今天 22:00', status: 'review', isDue: true },
        { id: 'card_6', zh: '这个风险需要提前暴露。', en: 'We need to surface this risk early.', dueAt: '明天 10:00', status: 'learning', isDue: false }
      ],
      meeting: [
        { id: 'card_7', zh: '这次会议我再确认下时间。', en: 'I will double-check the meeting time.', dueAt: '今天 19:30', status: 'review', isDue: true }
      ]
    };

    const deckList = document.getElementById('deckList');
    const cardRows = document.getElementById('cardRows');
    const detailName = document.getElementById('detailName');
    const detailSub = document.getElementById('detailSub');
    const ruleNote = document.getElementById('ruleNote');
    const deleteDeckBtn = document.getElementById('deleteDeckBtn');
    const moveAllBtn = document.getElementById('moveAllBtn');
    const createDeckBtn = document.getElementById('createDeckBtn');
    const createDeckEmptyBtn = document.getElementById('createDeckEmptyBtn');

    const modal = document.getElementById('deckModal');
    const modalTitle = document.getElementById('deckModalTitle');
    const modalSub = document.getElementById('deckModalSub');
    const modalBody = document.getElementById('deckModalBody');
    const confirmModalBtn = document.getElementById('confirmModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelModalBtn = document.getElementById('cancelModalBtn');

    let selectedDeckId = 'daily';
    let nextId = 100;
    let modalConfirmHandler = null;

    function ensureDeckCards(deckId) {
      if (!cardsByDeck[deckId]) cardsByDeck[deckId] = [];
      return cardsByDeck[deckId];
    }

    function getDeckStats(deckId) {
      const cards = ensureDeckCards(deckId);
      return {
        newCount: cards.filter((c) => c.status === 'new').length,
        learningCount: cards.filter((c) => c.status === 'learning').length,
        reviewCount: cards.filter((c) => c.status === 'review').length,
        due: cards.filter((c) => c.isDue).length,
        total: cards.length
      };
    }

    function getDeckById(deckId) {
      return decks.find((deck) => deck.id === deckId);
    }

    function getDeckOptions(excludeDeckId) {
      return decks.filter((deck) => deck.id !== excludeDeckId);
    }

    function renderDeckList() {
      deckList.innerHTML = '';
      decks.forEach((deck) => {
        const stats = getDeckStats(deck.id);
        const el = document.createElement('article');
        el.className = `deck-item ${deck.id === selectedDeckId ? 'active' : ''}`;
        el.dataset.id = deck.id;
        el.innerHTML = `
          <div class="deck-top">
            <div class="deck-name">${deck.name}</div>
            <div class="deck-due">${stats.due}</div>
          </div>
          <div class="deck-meta">
            <span class="badge badge-new">新 ${stats.newCount}</span>
            <span class="badge badge-learning">学习中 ${stats.learningCount}</span>
            <span class="badge badge-review">待复习 ${stats.reviewCount}</span>
          </div>
          <div class="deck-flags">
            <span class="flag">总计 ${stats.total} 张</span>
            ${deck.isDefault ? '<span class="flag">默认组（不可删除）</span>' : ''}
          </div>
        `;
        el.addEventListener('click', () => {
          selectedDeckId = deck.id;
          renderDeckList();
          renderDetail();
        });
        deckList.appendChild(el);
      });
    }

    function renderDetail() {
      const deck = getDeckById(selectedDeckId);
      if (!deck) return;
      const stats = getDeckStats(selectedDeckId);
      const cards = ensureDeckCards(selectedDeckId);

      detailName.textContent = deck.name;
      detailSub.textContent = `新卡 ${stats.newCount} · 学习中 ${stats.learningCount} · 待复习 ${stats.reviewCount}`;

      const cannotDelete = deck.isDefault || stats.total > 0;
      deleteDeckBtn.disabled = cannotDelete;
      moveAllBtn.disabled = stats.total === 0;
      ruleNote.textContent = deck.isDefault
        ? '默认组不可删除；当自动分组无法命中时，系统会回落到默认组。'
        : stats.total > 0
          ? '该组存在卡片，按当前需求规则不可删除。请先移动或清空卡片。'
          : '该组无卡片，可删除。';

      cardRows.innerHTML = '';
      cards.forEach((card, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${card.zh}</td>
          <td class="card-en">${card.en}</td>
          <td>${card.dueAt}</td>
          <td>
            <div class="row-actions">
              <button class="mini-btn" data-action="edit" data-index="${index}">编辑</button>
              <button class="mini-btn" data-action="move" data-index="${index}">移动</button>
              <button class="mini-btn" data-action="delete-card" data-index="${index}">删除</button>
            </div>
          </td>
        `;
        cardRows.appendChild(row);
      });

      if (cards.length === 0) {
        const row = document.createElement('tr');
        row.innerHTML = '<td colspan="4" style="text-align:center;color:var(--muted);">该组暂无卡片</td>';
        cardRows.appendChild(row);
      }
    }

    function syncView() {
      if (!getDeckById(selectedDeckId) && decks.length) {
        selectedDeckId = decks[0].id;
      }
      renderDeckList();
      renderDetail();
    }

    function exitEmptyMode() {
      if (!isEmptyState) return;
      document.getElementById('mainGrid').style.display = 'grid';
      document.getElementById('emptyCard').style.display = 'none';
      document.getElementById('normalLink').classList.add('active');
      document.getElementById('emptyLink').classList.remove('active');
      history.replaceState(null, '', 'v3-c-warm-orange-decks.html');
    }

    function closeModal() {
      modal.classList.remove('show');
      modalConfirmHandler = null;
    }

    function openModal({ title, sub, bodyHtml, confirmText = '确认', onConfirm }) {
      modalTitle.textContent = title;
      modalSub.textContent = sub;
      modalBody.innerHTML = bodyHtml;
      confirmModalBtn.textContent = confirmText;
      modalConfirmHandler = onConfirm;
      modal.classList.add('show');
    }

    confirmModalBtn.addEventListener('click', () => {
      if (!modalConfirmHandler) {
        closeModal();
        return;
      }
      const shouldClose = modalConfirmHandler();
      if (shouldClose !== false) closeModal();
    });
    closeModalBtn.addEventListener('click', closeModal);
    cancelModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    function openCreateDeckModal() {
      openModal({
        title: '创建卡片组',
        sub: '新组默认是空组，可直接被删除',
        bodyHtml: `
          <div class="form-row">
            <label class="form-label" for="deckNameInput">卡片组名称</label>
            <input id="deckNameInput" class="form-input" maxlength="24" placeholder="例如：旅行应急">
          </div>
        `,
        confirmText: '创建',
        onConfirm: () => {
          const input = document.getElementById('deckNameInput');
          const name = input.value.trim();
          if (!name) {
            alert('请输入卡片组名称。');
            return false;
          }
          if (decks.some((deck) => deck.name === name)) {
            alert('已存在同名卡片组，请换一个名称。');
            return false;
          }
          const deckId = `deck_${Date.now().toString(36)}_${nextId++}`;
          decks.push({ id: deckId, name, isDefault: false });
          cardsByDeck[deckId] = [];
          selectedDeckId = deckId;
          // 空状态点击创建时，直接完成创建并切到正常态，减少一次无效跳转
          exitEmptyMode();
          syncView();
          return true;
        }
      });
    }

    function openEditCardModal(cardIndex) {
      const cards = ensureDeckCards(selectedDeckId);
      const card = cards[cardIndex];
      if (!card) return;
      openModal({
        title: '编辑卡片',
        sub: '按需求，编辑不重置 FSRS 状态',
        bodyHtml: `
          <div class="form-row">
            <label class="form-label" for="editZhInput">中文</label>
            <textarea id="editZhInput" class="form-textarea">${card.zh}</textarea>
          </div>
          <div class="form-row">
            <label class="form-label" for="editEnInput">英文</label>
            <textarea id="editEnInput" class="form-textarea">${card.en}</textarea>
          </div>
        `,
        confirmText: '保存',
        onConfirm: () => {
          const zh = document.getElementById('editZhInput').value.trim();
          const en = document.getElementById('editEnInput').value.trim();
          if (!zh || !en) {
            alert('中文和英文都不能为空。');
            return false;
          }
          card.zh = zh;
          card.en = en;
          renderDetail();
          return true;
        }
      });
    }

    function openMoveCardModal(cardIndex) {
      const cards = ensureDeckCards(selectedDeckId);
      const card = cards[cardIndex];
      if (!card) return;
      const options = getDeckOptions(selectedDeckId);
      if (options.length === 0) {
        alert('当前没有可移动到的目标卡片组。');
        return;
      }
      openModal({
        title: '移动卡片',
        sub: '将当前卡片移动到其他组',
        bodyHtml: `
          <div class="form-row">
            <label class="form-label">卡片内容</label>
            <div class="form-input" style="background:#fff9f2;">${card.zh}</div>
          </div>
          <div class="form-row">
            <label class="form-label" for="moveTargetSelect">目标卡片组</label>
            <select id="moveTargetSelect" class="form-select">
              ${options.map((deck) => `<option value="${deck.id}">${deck.name}</option>`).join('')}
            </select>
          </div>
        `,
        confirmText: '确认移动',
        onConfirm: () => {
          const targetDeckId = document.getElementById('moveTargetSelect').value;
          const movedCard = cards.splice(cardIndex, 1)[0];
          ensureDeckCards(targetDeckId).push(movedCard);
          syncView();
          return true;
        }
      });
    }

    function openMoveAllModal() {
      const sourceCards = ensureDeckCards(selectedDeckId);
      if (sourceCards.length === 0) {
        alert('当前组没有卡片可移动。');
        return;
      }
      const options = getDeckOptions(selectedDeckId);
      if (options.length === 0) {
        alert('当前没有可移动到的目标卡片组。');
        return;
      }
      openModal({
        title: '移动本组全部卡片',
        sub: '用于快速清空分组，以便后续删除该组',
        bodyHtml: `
          <div class="form-row">
            <label class="form-label" for="moveAllTargetSelect">目标卡片组</label>
            <select id="moveAllTargetSelect" class="form-select">
              ${options.map((deck) => `<option value="${deck.id}">${deck.name}</option>`).join('')}
            </select>
          </div>
        `,
        confirmText: '全部移动',
        onConfirm: () => {
          const targetDeckId = document.getElementById('moveAllTargetSelect').value;
          ensureDeckCards(targetDeckId).push(...sourceCards.splice(0, sourceCards.length));
          syncView();
          return true;
        }
      });
    }

    function deleteDeck() {
      const deck = getDeckById(selectedDeckId);
      if (!deck) return;
      const stats = getDeckStats(deck.id);
      if (deck.isDefault) {
        alert('默认组不可删除。');
        return;
      }
      if (stats.total > 0) {
        alert('该组还有卡片，请先移动或清空后再删除。');
        return;
      }
      if (!confirm(`确认删除卡片组「${deck.name}」吗？`)) return;
      const idx = decks.findIndex((item) => item.id === deck.id);
      decks.splice(idx, 1);
      delete cardsByDeck[deck.id];
      selectedDeckId = decks[0]?.id || 'default';
      syncView();
    }

    cardRows.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      const cardIndex = Number(btn.dataset.index);
      if (action === 'edit') openEditCardModal(cardIndex);
      if (action === 'move') openMoveCardModal(cardIndex);
      if (action === 'delete-card') {
        if (!confirm('确认删除这张卡片吗？')) return;
        ensureDeckCards(selectedDeckId).splice(cardIndex, 1);
        syncView();
      }
    });

    createDeckBtn.addEventListener('click', openCreateDeckModal);
    createDeckEmptyBtn.addEventListener('click', openCreateDeckModal);
    moveAllBtn.addEventListener('click', openMoveAllModal);
    deleteDeckBtn.addEventListener('click', deleteDeck);

    function initAvatarMenu() {
      const avatarBtn = document.getElementById('avatarBtn');
      const avatarDropdown = document.getElementById('avatarDropdown');
      if (!avatarBtn || !avatarDropdown) return;

      const closeAvatarMenu = () => {
        avatarDropdown.classList.remove('show');
        avatarBtn.setAttribute('aria-expanded', 'false');
      };

      avatarBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        const willShow = !avatarDropdown.classList.contains('show');
        avatarDropdown.classList.toggle('show', willShow);
        avatarBtn.setAttribute('aria-expanded', String(willShow));
      });

      document.addEventListener('click', (event) => {
        if (!event.target.closest('.avatar-menu')) closeAvatarMenu();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeAvatarMenu();
      });

      document.getElementById('accountInfoBtn')?.addEventListener('click', () => {
        alert('账号信息页将在后续版本上线。');
        closeAvatarMenu();
      });

      document.getElementById('logoutBtn')?.addEventListener('click', () => {
        alert('已退出登录（Mock）。');
        closeAvatarMenu();
        location.href = 'v3-c-warm-orange-home.html';
      });
    }

    initAvatarMenu();

    if (isEmptyState) {
      document.getElementById('mainGrid').style.display = 'none';
      document.getElementById('emptyCard').style.display = 'block';
    } else {
      syncView();
    }
  </script>
</body>
</html>
